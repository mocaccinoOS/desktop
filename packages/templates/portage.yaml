{{ define "portage_excludes" }}
- ^/etc/portage/savedconfig
- ^/usr/portage
- ^/usr/portage/distfiles
- ^/usr/tmp/portage
- ^/var/cache/distfiles
- ^/var/cache/edb
- ^/var/db/pkg
- ^/var/db/repos
- ^/var/lib/portage
- ^/var/log
# devel split
- ^/etc/ld.so.cache
- ^/etc/ld.so.conf
- ^/usr/include
- ^/usr/lib/cmake
- ^/usr/lib64/cmake
- ^/luetbuild
- ^/tmp
# Python bytecode
- ^/usr/lib/python.*/__pycache__
- ^/usr/lib/python.*/.*\.pyc$
- ^/usr/lib/python.*/.*\.pyo$
# Python test directories
- ^/usr/lib/python.*/test
- ^/usr/lib/python.*/tests
# Python egg-info
- ^/usr/lib/python.*/.*\.egg-info
# Perl packlist
- ^/usr/lib.*/perl5/.*/.packlist$
- ^/usr/lib64/perl5/.*/.packlist$
{{end}}

{{ define "devel_excludes" }}
{{ template "portage_excludes" }}
- ^/usr/lib64/.*\.a$
- ^/usr/lib/.*\.a$
{{end}}

{{ define "portage_env" }}
- JOBS={{ ( index .Values.labels "emerge.jobs" ) | default "3" }}
{{end}}

{{ define "portage_copy_package_files" }}
- cp -rf package.* /etc/portage/
{{end}}

{{ define "portage_select_fastest_binhost" }}
- |
  command -v mirrorselect >/dev/null 2>&1 || { echo "mirrorselect not available in this layer, skipping binhost mirror selection"; exit 0; } && \
  BINREPOS_DIR="/etc/portage/binrepos.conf" && \
  REPO_FILE="${BINREPOS_DIR}/zz-mocaccino-fastest-binhost.conf" && \
  BINPKG_PATH="releases/amd64/binpackages/23.0/x86-64/" && \
  REPO_NAME="mocaccino-fastest-binhost" && \
  PRIORITY=10000 && \
  FALLBACK="https://distfiles.gentoo.org/" && \
  MS_OUTPUT=$(mirrorselect -s5 -b20 -4 -o 2>/dev/null || true) && \
  FASTEST=$(echo "$MS_OUTPUT" | grep -oP 'GENTOO_MIRRORS="\K[^"]*' | awk '{print $1}') && \
  { [ -z "$FASTEST" ] && FASTEST="$FALLBACK"; true; } && \
  BINHOST_URL="${FASTEST%/}/${BINPKG_PATH}" && \
  mkdir -p "$BINREPOS_DIR" && \
  { echo "[${REPO_NAME}]"; echo "priority = ${PRIORITY}"; echo "sync-uri = ${BINHOST_URL}"; } > "$REPO_FILE" && \
  echo "Selected fastest binhost: ${BINHOST_URL} (priority ${PRIORITY})"
{{end}}

{{ define "portage_prelude_build" }}
- |
  emerge -j ${JOBS} --onlydeps --onlydeps-with-rdeps n {{ ( index .Values.labels "emerge.packages" ) }} && \
  emerge -C {{ ( index .Values.labels "emerge.packages" ) }} || true && \
  /bin/sh -c 'find /usr -xtype l 2>/dev/null -exec rm -v {} \;'
{{end}}

{{ define "portage_prelude_build_gentoo_binary" }}
{{ template "portage_select_fastest_binhost" }}
- |
  FEATURES="noinfo -preserve-libs -sandbox -usersandbox -ipc-sandbox -pid-sandbox -network-sandbox binpkg-request-signature" EMERGE_DEFAULT_OPTS="--getbinpkg --quiet" emerge -j ${JOBS} --onlydeps --onlydeps-with-rdeps n {{ ( index .Values.labels "emerge.packages" ) }} && \
  emerge -C {{ ( index .Values.labels "emerge.packages" ) }} || true && \
  /bin/sh -c 'find /usr -xtype l 2>/dev/null -exec rm -v {} \;'
- if [ -d /var/cache/binpkgs/ ] && [ ! -z "$(ls -A /var/cache/binpkgs/)" ]; then rm -r /var/cache/binpkgs/*; fi
- if [ -d /var/cache/binhost/ ] && [ ! -z "$(ls -A /var/cache/binhost/)" ]; then rm -r /var/cache/binhost/*; fi
{{end}}

{{ define "portage_build" }}
- emerge -j ${JOBS} {{ ( index .Values.labels "emerge.packages" ) }}
- etc-update -q --automode -5
{{end}}

{{ define "portage_build_gentoo_binary" }}
- FEATURES="noinfo -preserve-libs -sandbox -usersandbox -ipc-sandbox -pid-sandbox -network-sandbox binpkg-request-signature" EMERGE_DEFAULT_OPTS="--getbinpkg --quiet" emerge -j ${JOBS} {{ ( index .Values.labels "emerge.packages" ) }}
- if [ -d /var/cache/binpkgs/ ] && [ ! -z "$(ls -A /var/cache/binpkgs/)" ]; then rm -r /var/cache/binpkgs/*; fi
- if [ -d /var/cache/binhost/ ] && [ ! -z "$(ls -A /var/cache/binhost/)" ]; then rm -r /var/cache/binhost/*; fi
- rm -f /etc/portage/binrepos.conf/zz-mocaccino-fastest-binhost.conf
- etc-update -q --automode -5
{{end}}

{{ define "housekeeping" }}

# -----------------------------
# ccache cleanup (optional)
# -----------------------------
# Clears compiler cache to avoid leaking build artifacts into final image.
# Only runs if ccache exists in PATH.
- if command -v ccache >/dev/null 2>&1; then env CCACHE_DIR=/var/cache/ccache ccache -C || true; fi

{{end}}