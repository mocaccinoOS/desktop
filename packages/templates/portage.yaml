{{ define "portage_excludes" }}
- ^/etc/portage/savedconfig
- ^/usr/portage
- ^/usr/portage/distfiles
- ^/usr/tmp/portage
- ^/var/cache/distfiles
- ^/var/cache/edb
- ^/var/db/pkg
- ^/var/db/repos
- ^/var/lib/portage
- ^/var/log
# devel split
- ^/etc/ld.so.cache
- ^/etc/ld.so.conf
- ^/usr/include
- ^/usr/lib/cmake
- ^/usr/lib64/cmake
- ^/luetbuild
- ^/tmp
{{end}}

{{ define "devel_excludes" }}
{{ template "portage_excludes" }}
- ^/usr/lib64/.*\.a$
- ^/usr/lib/.*\.a$
{{end}}

{{ define "portage_env" }}
- JOBS={{ ( index .Values.labels "emerge.jobs" ) | default "3" }}
{{end}}

{{ define "portage_copy_package_files" }}
- cp -rf package.* /etc/portage/
{{end}}

{{ define "portage_prelude_build" }}
- |
  emerge -j ${JOBS} --onlydeps --onlydeps-with-rdeps n {{ ( index .Values.labels "emerge.packages" ) }} && \
  emerge -C {{ ( index .Values.labels "emerge.packages" ) }} || true && \
  /bin/sh -c 'find /usr -xtype l 2>/dev/null -exec rm -v {} \;'
{{end}}

{{ define "portage_prelude_build_gentoo_binary" }}
- |
  FEATURES="noinfo -preserve-libs -sandbox -usersandbox -ipc-sandbox -pid-sandbox -network-sandbox binpkg-request-signature" EMERGE_DEFAULT_OPTS="--getbinpkg --quiet" emerge -j ${JOBS} --onlydeps --onlydeps-with-rdeps n {{ ( index .Values.labels "emerge.packages" ) }} && \
  emerge -C {{ ( index .Values.labels "emerge.packages" ) }} || true && \
  /bin/sh -c 'find /usr -xtype l 2>/dev/null -exec rm -v {} \;'
- if [ -d /var/cache/binpkgs/ ] && [ ! -z "$(ls -A /var/cache/binpkgs/)" ]; then rm -r /var/cache/binpkgs/*; fi
- if [ -d /var/cache/binhost/ ] && [ ! -z "$(ls -A /var/cache/binhost/)" ]; then rm -r /var/cache/binhost/*; fi
{{end}}

{{ define "portage_build" }}
- emerge -j ${JOBS} {{ ( index .Values.labels "emerge.packages" ) }}
- etc-update -q --automode -5
{{end}}

{{ define "portage_build_gentoo_binary" }}
- FEATURES="noinfo -preserve-libs -sandbox -usersandbox -ipc-sandbox -pid-sandbox -network-sandbox binpkg-request-signature" EMERGE_DEFAULT_OPTS="--getbinpkg --quiet" emerge -j ${JOBS} {{ ( index .Values.labels "emerge.packages" ) }}
- if [ -d /var/cache/binpkgs/ ] && [ ! -z "$(ls -A /var/cache/binpkgs/)" ]; then rm -r /var/cache/binpkgs/*; fi
- if [ -d /var/cache/binhost/ ] && [ ! -z "$(ls -A /var/cache/binhost/)" ]; then rm -r /var/cache/binhost/*; fi
- etc-update -q --automode -5
{{end}}

{{ define "housekeeping" }}

# -----------------------------
# ccache cleanup (optional)
# -----------------------------
# Clears compiler cache to avoid leaking build artifacts into final image.
# Only runs if ccache exists in PATH.
- |
  if command -v ccache >/dev/null 2>&1; then
    CCACHE_DIR=/var/cache/ccache ccache -C || true
  fi

# -----------------------------
# Python bytecode cleanup
# -----------------------------
# Removes __pycache__ directories and compiled Python bytecode.
# These are runtime-generated optimizations and will be regenerated if needed.
- find /usr -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
- find /usr -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete 2>/dev/null || true

# -----------------------------
# Python test directories cleanup (hardened)
# -----------------------------
# Removes test suites only inside Python site-packages.
# This avoids touching system /usr/share tests or other packages.
# Intended for runtime images only (not dev environments).
- find /usr/lib/python*/site-packages /usr/lib/python*/*/site-packages \
    -type d \( -name test -o -name tests \) \
    -prune -exec rm -rf {} + 2>/dev/null || true

# -----------------------------
# Python packaging metadata cleanup
# -----------------------------
# Removes setuptools development metadata directories.
# These are used for development/build systems, not runtime execution.
# Safe to remove in final runtime images.
- find /usr -type d -name '*.egg-info' -prune -exec rm -rf {} + 2>/dev/null || true

# -----------------------------
# Perl packaging metadata cleanup (.packlist)
# -----------------------------
# Removes ExtUtils installation bookkeeping files.
# These are only used for Perl module install/uninstall tracking
# and are not required at runtime.
# Safe for runtime images.
- find /usr/lib*/perl5 /usr/lib64/perl5 \
    -type f -name '.packlist' \
    -delete 2>/dev/null || true

{{end}}