install:
- ldconfig
# TEST
# Added for testing. Must move to layers/system-x
# Remove stale LLVM env.d files for versions that are no longer installed
- |
  for f in /etc/env.d/60llvm-*; do
    [ -f "$f" ] || continue
    llvm_path=$(grep -m1 '^PATH=' "$f" | cut -d'"' -f2)
    if [ -n "$llvm_path" ] && [ ! -d "$llvm_path" ]; then
      rm "$f"
    fi
  done
- source /etc/profile > /dev/null 2>&1 && env-update > /dev/null 2>&1
# This must be run incase of trival changes in config files
- etc-update -p
# END TEST