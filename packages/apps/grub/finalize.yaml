install:
# Only merge grub.d files safely, never touch other configs
- for f in /etc/grub.d/._cfg*; do [ -f "$f" ] && mv "$f" "$(dirname $f)/$(basename $f | sed 's/\._cfg[0-9]*_//')"; done
# Discard any pending grub default config to preserve user changes
- rm -f /etc/default/._cfg*_grub
- ldconfig
