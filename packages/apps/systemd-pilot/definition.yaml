category: "apps"
name: "systemd-pilot"
version: 3.0.0+6
uri:
  - https://github.com/mfat/systemd-pilot
license: "GPL-3+"
description: "Desktop application for managing systemd services"
labels:
  emerge.jobs: "1"
  emerge.packages: >-
    sys-apps/systemd-pilot dev-python/keyring dev-python/paramiko dev-python/pynacl
  description: "Desktop application for managing systemd services"
provides:
  - name: keyring
    category: dev-python
    version: '>=0'
  - name: paramiko
    category: dev-python
    version: '>=0'
  - name: pynacl
    category: dev-python
    version: '>=0'
  - name: systemd-pilot
    category: sys-apps
    version: '>=0'
requires:
  - category: "layers"
    name: "gnome-common"
    version: ">=0"
