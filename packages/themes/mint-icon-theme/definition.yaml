category: "themes"
name: "mint-icon-theme"
version: "1.7.5"
uri:
  - https://github.com/linuxmint/mint-x-icons
license: "GPL-3"
description: "Mint-X icon theme for Linux Mint (based on Faenza and Elementary)"
labels:
  emerge.jobs: "1"
  emerge.packages: >-
    x11-themes/mint-icons
requires:
  - category: "layers"
    name: "X"
    version: ">=0"
provides:
  - name: mint-icons
    category: x11-themes
    version: '>=0'
