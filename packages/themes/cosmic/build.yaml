image: "alpine"
prelude:
steps:
# Set opacity for the cosmic Term to 75
- install -Dm644 /dev/null /etc/skel/.config/cosmic/com.system76.CosmicTerm/v1/opacity && echo "75" > /etc/skel/.config/cosmic/com.system76.CosmicTerm/v1/opacity
# Set Mocaccino wallpaper
- install -Dm644 files/all /etc/skel/.config/cosmic/com.system76.CosmicBackground/v1/all
# Set MocaccinoOS accent color (#cb9b7a) for both dark and light themes
- install -Dm644 files/accent /etc/skel/.config/cosmic/com.system76.CosmicTheme.Dark/v1/accent
- install -Dm644 files/accent /etc/skel/.config/cosmic/com.system76.CosmicTheme.Light/v1/accent