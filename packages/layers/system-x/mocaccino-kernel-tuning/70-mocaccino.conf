# MocaccinoOS Performance Optimizations
#
# This file contains system and network optimizations enabled by default.
# Some additional settings are provided as EXAMPLES, which users can uncomment
# for testing. Changes made here will persist after a reboot but WILL BE
# OVERWRITTEN when the system is upgraded.
#
# To make your custom settings permanent, create:
#   /etc/sysctl.d/99-custom.conf
#
# Example:
#   echo "net.ipv4.tcp_congestion_control=bbr" | sudo tee /etc/sysctl.d/99-custom.conf
#   sudo sysctl --system
#

# ──────────────────────────────────────────────────────────────
# Network Optimizations (Enabled by Default)
# ──────────────────────────────────────────────────────────────

# Use FQ (Fair Queuing) as the default queuing discipline.
# Improves packet scheduling and reduces bufferbloat.
net.core.default_qdisc=fq

# Enable BBR (Bottleneck Bandwidth and RTT) congestion control.
# Reduces latency and improves network throughput.
net.ipv4.tcp_congestion_control=bbr

# ──────────────────────────────────────────────────────────────
# TCP Buffer Size Optimizations (Option A: Low Latency enabled)
# ──────────────────────────────────────────────────────────────
# Uncomment ONE section below to test. Do not enable both at the same time.
# For permanent changes, copy your chosen settings to /etc/sysctl.d/99-custom.conf.

# Option A: Low Latency (gaming, video conferencing)
# Smaller buffers reduce queuing delays at the cost of raw throughput.
net.core.rmem_max=4194304
net.core.wmem_max=4194304
net.ipv4.tcp_rmem=4096 87380 4194304
net.ipv4.tcp_wmem=4096 16384 4194304

# Option B: High Bandwidth (file transfers, streaming)
# Larger buffers improve throughput on fast connections.
# net.core.rmem_max=16777216
# net.core.wmem_max=16777216
# net.ipv4.tcp_rmem=4096 87380 16777216
# net.ipv4.tcp_wmem=4096 65536 16777216

# ──────────────────────────────────────────────────────────────
# Memory Management Optimizations (Enabled by Default)
# ──────────────────────────────────────────────────────────────

# Reduce swap usage. Keeps more data in RAM on systems with sufficient memory.
vm.swappiness=10

# Dirty page writeback tuning — controls when the kernel flushes writes to disk.
# Lower values trigger smaller, more frequent flushes, avoiding large sudden
# I/O bursts that cause stutters and freezes during disk operations.
vm.dirty_ratio=10
vm.dirty_background_ratio=3

# Reduce VFS cache pressure. Lower values keep directory/inode caches in RAM
# longer, improving I/O performance. Avoid going below 50 on low-memory systems.
vm.vfs_cache_pressure=50

# ──────────────────────────────────────────────────────────────
# Filesystem & Process Optimizations (Enabled by Default)
# ──────────────────────────────────────────────────────────────

# Increase inotify watcher limits for file monitoring.
# Beneficial for VSCode, Unreal Engine, Docker, and similar tools.
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=1024

# ──────────────────────────────────────────────────────────────
# Informational: Memory Map Limit (Not Modified)
# ──────────────────────────────────────────────────────────────
# The default vm.max_map_count is 65530, which is sufficient for most users.
# Some workloads require a higher value:
#   - Elasticsearch:              262144
#   - High-performance / AI/ML:   1048576+
#
# To override, add to /etc/sysctl.d/99-custom.conf:
#   echo "vm.max_map_count=262144" | sudo tee -a /etc/sysctl.d/99-custom.conf
#   sudo sysctl --system
#
# vm.max_map_count=65530