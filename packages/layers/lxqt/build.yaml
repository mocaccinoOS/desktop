excludes:
{{ template "portage_excludes" }}
- ^/usr/include/.*
- ^/usr/lib64/.*\.a$
- ^/usr/lib/.*\.a$
env:
{{ template "portage_env" . }}
prelude:
{{ template "portage_copy_package_files" . }}
- emerge -1 media-sound/pavucontrol-qt
{{ template "portage_prelude_build" . }}
steps:
{{ template "portage_build" . }}
requires:
- category: "layers"
  name: "kde-common"
  version: ">=0"
subpackages:
- name: "lxqt-devel"
  category: "layers"
  version: "{{.Values.version}}"
  includes:
  - ^/usr/include$
  - ^/usr/include/.*
  - ^/usr/lib64/.*\.a$
  - ^/usr/lib/.*\.a$