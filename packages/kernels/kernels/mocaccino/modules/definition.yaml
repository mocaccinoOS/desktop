name: mocaccino-modules
category: kernel
version: "7.1.2"
prefix: linux
suffix: mocaccino
arch: "x86_64"
description: "Core kernel modules and hardware drivers for the stable Linux kernel, providing essential support for file systems, network devices, and system hardware peripherals"
labels:
  autobump.revdeps: "false"
  autobump.string_replace: '{ "prefix": "" }'
  autobump.strategy: "custom"
  autobump.prefix: "prefix"
  autobump.hook: |
    curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "stable") ][0].version'
  autobump.version_hook: |
    curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "stable") ][0].version'
  package.version: "7.1.2"
