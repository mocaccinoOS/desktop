packages:
  - category: "kernel"
    name: "mocaccino-lts-initramfs"
    modules_name: "mocaccino-lts-modules"
    version: "6.18.33"
    git_sha: "e80e77438c627981b266734c03e23dcf8a60014e"
    golang_version: "1.20.14"
    arch: "amd64"
    description: "Initial RAM filesystem (initramfs) for the Long-Term Support (LTS) Linux kernel, providing the essential drivers, modules, and scripts required to mount the root filesystem during the early boot phase."
    labels:
      autobump.revdeps: "false"
      autobump.string_replace: '{ "prefix": "" }'
      autobump.strategy: "custom"
      autobump.prefix: "prefix"
      autobump.hook: |
        curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "longterm") ][0].version'
      autobump.version_hook: |
        curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "longterm") ][0].version'
      package.version: "6.18.33"
  - category: "kernel"
    name: "mocaccino-initramfs"
    modules_name: "mocaccino-modules"
    version: "7.0.11"
    git_sha: "e80e77438c627981b266734c03e23dcf8a60014e"
    golang_version: "1.20.14"
    arch: "amd64"
    description: "Initial RAM filesystem (initramfs) for the stable Linux kernel, containing necessary utilities and storage drivers to handle early system initialization and root device discovery."
    labels:
      autobump.revdeps: "false"
      autobump.string_replace: '{ "prefix": "" }'
      autobump.strategy: "custom"
      autobump.prefix: "prefix"
      autobump.hook: |
        curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "stable") ][0].version'
      autobump.version_hook: |
        curl -Ls https://kernel.org/releases.json | jq -cr '[ .releases[] | select(.moniker == "stable") ][0].version'
      package.version: "7.0.11"
